
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Animal Rescue</title>
    <link rel="stylesheet" href="login.css"> <!-- Link to your CSS file -->
</head>
<body>
    <div class="login-container">
        <h2>Login</h2>
        <form id="loginForm">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            
            <button type="submit">Login</button>
        </form>
        <p>Don't have an account? <a href="register.html">Sign up</a></p>
        <div id="error-message" style="color: red; display: none;">Invalid email or password. Please try again.</div>
    </div>

    <script>document.addEventListener("DOMContentLoaded", function () {
        const loginForm = document.getElementById("loginForm");
        const errorMessage = document.getElementById("error-message");
    
        loginForm.addEventListener("submit", function (event) {
            event.preventDefault(); // Prevent form submission
    
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
    
            // Retrieve user data from localStorage
            const user = JSON.parse(localStorage.getItem("user"));
    
            if (user) {
                // Validate email and password
                if (email === user.email && password === user.password) {
                    alert("Login successful!");
                    window.location.href = "home.html"; // Redirect to home page upon successful login
                } else {
                    errorMessage.style.display = "block"; // Show error message if credentials are invalid
                }
            } else {
                errorMessage.style.display = "block"; // If no user is registered, show error message
            }
        });
    });
    </script> <!-- Link to your JS file -->
</body>
</html>
