<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Donation Form - Animal Adoption & Rescue</title>
  <link rel="stylesheet" href="donation.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <header>
    <h1>Support Our Cause</h1>
    <nav>
      <a href="home.html">Home</a>
      <a href="donation.html">Donation</a>
      <a href="adopt.html">Adopt</a>
      <a href="rescue.html">Rescue Team</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <section id="donation-form">
    <h2>Make a Donation</h2>
    <p>Your support helps us provide care for rescued animals. Every contribution makes a difference!</p>

    <form id="donateForm">
      <label for="fullName">Full Name:</label>
      <input type="text" id="fullName" name="fullName" required />

      <label for="email">Email Address:</label>
      <input type="email" id="email" name="email" required />

      <label for="amount">Donation Amount (₹):</label>
      <input type="number" id="amount" name="amount" min="1" required />

      <label for="payment">Payment Method:</label>
      <select id="payment" name="payment">
        <option value="credit">Credit Card</option>
        <option value="debit">Debit Card</option>
        <option value="upi">UPI</option>
        <option value="paypal">PayPal</option>
      </select>

      <button type="submit" class="donate-btn">Donate Now</button>
    </form>
  </section>

  <footer>
    <p>&copy; 2025 Animal Adoption & Rescue Services. All Rights Reserved.</p>
  </footer>

  <script>
    document.getElementById('donateForm').addEventListener('submit', function(event) {
  event.preventDefault();

  const fullName = document.getElementById('fullName').value;
  const email = document.getElementById('email').value;
  const amount = document.getElementById('amount').value;
  const paymentMethod = document.getElementById('payment').value;

  if (fullName && email && amount > 0) {
    alert(`Thank you, ${fullName}! Your donation of ₹${amount} using ${paymentMethod} has been received.`);
    document.getElementById('donateForm').reset();
  } else {
    alert('Please fill in all fields with valid information.');
  }
});

  </script>
  <script src="home.html"></script>
</body>
</html>
